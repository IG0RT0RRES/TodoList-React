    <script src="https://download.playfab.com/PlayFabClientApi.js"></script>

      // O SDK do PlayFab e algumas bibliotecas esperam 'global' ou 'Buffer'

        window.global = window;
      }
      if (typeof window.Buffer === 'undefined') {
        // Mock básico para evitar erros de referência antes do polyfill carregar no main.jsx
        window.Buffer = { isBuffer: () => false };
      }
    </script>
